<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="viewport-fit=cover, user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height">
    <link href="res_m.css" rel="stylesheet" type="text/css">
	<title>MotionSense</title>
	<style>
        @font-face {
            font-family: 'MainFont';
            src: url('fonts/static/GoogleSans-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

		:root {
			color-scheme: light dark;
			font-family: "MainFont", "Segoe UI", sans-serif;
		}

		body {
			margin: 0;
			padding: 1rem;
			overscroll-behavior-y: none;
			-webkit-user-select: none;
			user-select: none;
			-webkit-touch-callout: none;
			touch-action: pan-x pan-y;
		}

		html,
		body {
			height: 100%;
			overscroll-behavior-y: none;
            overflow: hidden;
		}

		.pwa {
			max-width: 700px;
			margin: 0 auto;
		}

		@media screen and (orientation: landscape) {
			.pwa {
				display: none;
			}
		}

		.panel {
			border: 1px solid #8884;
			border-radius: 12px;
			padding: 1rem;
			margin-bottom: 1rem;
		}

		.row {
			display: flex;
			gap: 0.75rem;
			align-items: center;
			flex-wrap: wrap;
		}

        .motionSenseToggle {
            border: 1px solid #666;
            border-radius: 999px;
            padding: 0.4rem 0.75rem;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            font-size: 0.7rem;
            color: #fff;
            background: #007000;
        }

        .motionSenseToggle.hide {
            background: #A10000;
        }

        .motionSenseToggle.recalibrate {
            background: #EBC106;
            color: #000;
        }

        /*
		.hide {
			display: none;
		}*/

		.d_n {
			display: none;
		}

		.motionIcon {
			width: 28px;
			height: 28px;
			border-radius: 50%;
			border: 1px solid #666;
		}

		.motionIcon .img {
			width: 100%;
			height: 100%;
		}

        .steps {
            font-size: 4rem;
        }

		.velocity {
			margin-bottom: 1rem;
		}

        .velocityMagnitude, .distanceMagnitude {
            font-size: 2rem;
        }

        .pedometer {
            margin-bottom: 2rem;
        }

		.startstop, .reset, .unitToggle {
			background: #808080;
			color: #fff;
			text-align: center;
			text-transform: uppercase;
			letter-spacing: 0.1rem;
			margin-top: 2rem;
			pointer-events: none;
		}

		.startstop.start {
			background: #007000;
			pointer-events: auto;
		}

		.startstop.stop {
			background: #A10000;
			pointer-events: auto;
		}

		.reset {
			pointer-events: auto;
			margin-top: 1rem;
		}

		.unitToggle {
			pointer-events: auto;
			margin-top: 2rem;
			width: 40%;
			font-size: 0.8rem;
			padding: 0.5rem;
			background: transparent;
			color: inherit;
			display: inline-block;
		}

		.unitToggle.stars {
			margin-left: 5%;
		}

		.unitToggle.stars.increment {
			background: #007000;
			color: #fff;
			font-weight: bold;
		}

		.unitToggle.stars.lookAheadWarn:not(.increment) {
			background: #A10000;
			color: #fff;
			font-weight: bold;
		}
	</style>
</head>
<body ondragstart="return false;" onselectstart="return false;" oncopy="return false;">
	<div class="pwa">
		<div class="home">
			<div class="banner row panel">
				<div class="motionIcon d_n"><div class="img"></div></div>
				<div class="motionSenseToggle hide">failed</div>
                <div class="motionSenseToggle recalibrate">recalibrate</div>
			</div>
		</div>

		<div class="popups">
			<div class="deviceInfo panel">
				<!-- <div class="steps">steps: 0</div> -->
                 <div class="pedometer"><div class="steps">0</div> steps</div>
				<!-- <div class="velocity" style="display: none;"></div> -->
                 <div class="velocity"><div class="velocityMagnitude"></div></div>
				 <div class="distance"><div class="distanceMagnitude"></div></div>
			</div>
			<!-- <div class="profile panel d_n">Watch your surroundings.</div> -->
			<div class="startstop panel">start</div>
			<div class="reset panel">reset</div>
			<div class="unitToggle panel">metric</div>
			<div class="unitToggle stars panel"><span class="starValue">0</span> / 50</div>
		</div>
	</div>

	<script>
		var op = { t: 250, te: 1000 };

		var ipAPIres = {
			country: { iso_code: "US" },
			online: true
		};

		var clientAPIres = {
			online: true
		};

		var gpsPos = null;
		var shaked = false;
		var unitMode = "metric";

		function tempUnit(c) {
			return "metric";
		}

		function getVelocityUnitLabel() {
			return (unitMode === "metric") ? "m/s" : "ft/s";
		}

		function velocityForDisplay(metersPerSecond) {
			var v = Number(metersPerSecond) || 0;
			return (unitMode === "metric") ? v : (v * 3.2808);
		}

		function renderVelocityValue(valueMps, label, sign, limiter) {
			if (!velocity) {
				return;
			}
			var displayValue = velocityForDisplay(valueMps);
			var velocityUnit = getVelocityUnitLabel();
			var signText = sign || "";
			var limiterText = limiter || "";
			velocity.innerHTML = "<div class='velocityMagnitude'>" + signText + displayValue.toFixed(1) + limiterText + " " + velocityUnit + "</div>" + label;
		}

		function updateUnitToggleLabel() {
			if (!unitToggleButton) {
				return;
			}
			unitToggleButton.textContent = unitMode;
		}

		function updateStarValueDisplay() {
			var starEl = document.querySelector('.starValue');
			if (starEl) {
				starEl.textContent = starValue;
			}
		}

		var starIncrementTimeout = null;
		var lookAheadStarTimeout = null;
		var lookAheadStarMarkup = '';

		function flashStarIncrement() {
			var starsToggle = document.querySelector('.pwa .unitToggle.stars');
			if (!starsToggle) {
				return;
			}
			starsToggle.classList.add('increment');
			if (starIncrementTimeout !== null) {
				clearTimeout(starIncrementTimeout);
			}
			starIncrementTimeout = setTimeout(function() {
				starsToggle.classList.remove('increment');
				starIncrementTimeout = null;
			}, 5000);
		}

		function flashLookAheadStars() {
			var starsToggle = document.querySelector('.pwa .unitToggle.stars');
			if (!starsToggle) {
				return;
			}
			if (starsToggle.classList.contains('increment')) {
				return;
			}
			if (!lookAheadStarMarkup) {
				lookAheadStarMarkup = starsToggle.innerHTML;
			}
			starsToggle.classList.add('lookAheadWarn');
			starsToggle.innerHTML = 'look up';
			if (lookAheadStarTimeout !== null) {
				clearTimeout(lookAheadStarTimeout);
			}
			lookAheadStarTimeout = setTimeout(function() {
				starsToggle.innerHTML = lookAheadStarMarkup;
				starsToggle.classList.remove('lookAheadWarn');
				updateStarValueDisplay();
				lookAheadStarTimeout = null;
			}, 5000);
		}

		var storageKey = 'motionSenseMetrics';
		var storageDateKey = 'motionSenseMetricsDate';
		var unitModeStorageKey = 'motionSenseUnitMode';

		function getStorageDate() {
			var dateStr = localStorage.getItem(storageDateKey);
			if (dateStr) {
				return new Date(parseInt(dateStr));
			}
			return new Date();
		}

		function isNewDay() {
			var savedDate = getStorageDate();
			var today = new Date();
			return (savedDate.getFullYear() !== today.getFullYear() ||
					savedDate.getMonth() !== today.getMonth() ||
					savedDate.getDate() !== today.getDate());
		}

		function saveMetricsToStorage() {
			var metrics = {
				steps: stepsCount,
				distance: distanceMeters,
				starValue: starValue,
				trackedStepCount: trackedStepCount,
				distanceStartSteps: distanceStartSteps
			};
			localStorage.setItem(storageKey, JSON.stringify(metrics));
			localStorage.setItem(storageDateKey, new Date().getTime());
		}

		function loadMetricsFromStorage() {
			var stored = localStorage.getItem(storageKey);
			if (stored) {
				try {
					var metrics = JSON.parse(stored);
					stepsCount = metrics.steps || 0;
					distanceMeters = metrics.distance || 0;
					trackedStepCount = metrics.trackedStepCount || ((metrics.starValue || 0) * 100);
					starValue = Math.min(50, metrics.starValue || Math.floor(trackedStepCount / 100));
					distanceStartSteps = metrics.distanceStartSteps || 0;
					distanceTrackingStartedAt = Date.now();
					return true;
				} catch (e) {
					console.log('Failed to parse stored metrics');
				}
			}
			return false;
		}

		function resetMetricsStorage() {
			stepsCount = 0;
			distanceMeters = 0;
			starValue = 0;
			trackedStepCount = 0;
			distanceStartSteps = 0;
			distanceTrackingStartedAt = 0;
			localStorage.removeItem(storageKey);
			localStorage.removeItem(storageDateKey);
		}

		function saveUnitModeToStorage() {
			localStorage.setItem(unitModeStorageKey, unitMode);
		}

		function loadUnitModeFromStorage() {
			var stored = localStorage.getItem(unitModeStorageKey);
			if (stored && (stored === 'metric' || stored === 'imperial')) {
				unitMode = stored;
				return true;
			}
			return false;
		}

		function mean(arr) {
			if (!arr || !arr.length) {
				return 0;
			}
			return arr.reduce((acc, curr) => acc + curr, 0) / arr.length;
		}

		var starValue = 0,
			normalAcc = 0,
			timerCountStepCheck = 0,
			timerCountStepInterval = null,
			timerCountStep = [],
			timerCounting = false,
			timerCount = 0,
			stepsCount = 0,
			trackedStepCount = 0,
			stepsCountInterval = [],
			stepsCountTimes = [],
			betaAngle = 0,
			rotation = false,
			noStep = false,
			motion = false,
			oneStopMotion = false,
			motionInterval = null,
			motionVelocity = false,
			motionStride = 0,
			avgMotionStride = 0,
			refVelocity = false,
			motionEnd = false,
			motionEndInterval = null,
			motionStart = false,
			motionStartRef = 0,
			motionStartInterval = null,
			motionRef = false,
			velocityConstantRef = 0,
			velocityPoints = [],
			velocityError = false,
			velocityCycle = 0,
			velocityCycleLatch = false,
			velocityCycleLive = 0,
			velocityCycleMax = 0,
			velocityCycleMaxPoints = [],
			velocityLive = 0,
			velocityLiveCheck = false,
			velocityLiveInterval = null,
			velocityEstRef = 0,
			pitchRef = 0,
			refZForce = 0,
			stepGravityMag = 9.81,
			stepPeakArmed = true,
			stepLastTimestamp = 0,
			stepMagMean = 0,
			stepMagDev = 0.2;

		var nDeviceTimeout = null;

		var motionType = "",
			commuteMode = false,
			motionTypeCommute = null,
			motionTypeStep = null;

		var motionEndCount = 0,
			motionEndCountInterval = null,
			motionEndCountArray = [];

		var accelerationCount = 0,
			accelerationDir = true,
			accelerationPoints = [],
			accelerationTimePoints = [],
			accelerationInterval = null;

		var deviceMotion = false,
			deviceOrientation = false;

		const steps = document.querySelector('.pwa .popups .deviceInfo .steps');
		const velocity = document.querySelector('.pwa .popups .deviceInfo .velocity');
		const distance = document.querySelector('.pwa .popups .deviceInfo .distance');
		const motionIcon = document.querySelector('.pwa .home .banner .motionIcon');
		const recalibrateToggle = document.querySelector('.pwa .home .banner .motionSenseToggle.recalibrate');
		const profilePanel = document.querySelector('.pwa .popups .profile.panel');
		const startStopButton = document.querySelector('.pwa .startstop');
		const resetButton = document.querySelector('.pwa .reset');
		const unitToggleButton = document.querySelector('.pwa .unitToggle');
		// const dataPanel = document.querySelector('.data');

		var metricsRecording = false,
			metricsRecords = [],
			metricsTapTimes = [],
			metricsRecordingStartedAt = 0,
			distanceTrackingStartedAt = 0,
			distanceLastSampleAt = 0,
			distanceMeters = 0,
			distanceStartSteps = 0,
			distanceFromVelocityMeters = 0,
			stepsDefaultColor = '',
			latestLinearMag = 0,
			latestCadenceVelocity = 0,
			latestGravityMagnitude = 0,
			latestGravityNormalized = 0,
			lookAheadLastAlertAt = 0;

		var dataAppendLastAt = 0;

		function appendDataRealtime(line) {
			if (!dataPanel) {
				return;
			}
			var now = Date.now();
			if ((now - dataAppendLastAt) < 200) {
				return;
			}
			dataAppendLastAt = now;
			dataPanel.textContent = line;
		}

		function setStartStopReadingState(isReading) {
			if (!startStopButton) {
				return;
			}
			if (isReading) {
				startStopButton.classList.add('start');
				startStopButton.classList.remove('stop');
				startStopButton.textContent = 'start';
			} else {
				startStopButton.classList.remove('start');
				startStopButton.classList.remove('stop');
				startStopButton.textContent = '';
			}
		}

		if (startStopButton) {
			startStopButton.addEventListener('click', function() {
				if (startStopButton.classList.contains('start')) {
					startMetricsRecording();
					startStopButton.classList.remove('start');
					startStopButton.classList.add('stop');
					startStopButton.textContent = 'stop';
				} else if (startStopButton.classList.contains('stop')) {
					stopMetricsRecording();
					startStopButton.classList.remove('stop');
					startStopButton.classList.add('start');
					startStopButton.textContent = 'start';
				}
			});
		}

		if (resetButton) {
			resetButton.addEventListener('click', function() {
				vibrateDevice([40]);
				metricsRecording = false;
				steps.style.color = stepsDefaultColor;
				metricsRecords = [];
				metricsTapTimes = [];
				metricsRecordingStartedAt = 0;

				resetMotionParams();
				resetDistanceTracking();

				stepsCount = 0;
				distanceMeters = 0;
				starValue = 0;
				resetMetricsStorage();

				steps.innerHTML = 0;
				updateStarValueDisplay();
				velocityEstRef = 0;
				velocityLive = 0;
				renderVelocityValue(0, 'velocity', '', '');
				setRecalibrateVisible(false);

				if (profilePanel) {
					profilePanel.classList.add('d_n');
				}

				if (startStopButton && startStopButton.classList.contains('stop')) {
					startStopButton.classList.remove('stop');
					startStopButton.classList.add('start');
					startStopButton.textContent = 'start';
				}
			});
		}

		if (unitToggleButton) {
			updateUnitToggleLabel();
			unitToggleButton.addEventListener('click', function() {
				vibrateDevice([40]);
				unitMode = (unitMode === 'metric') ? 'imperial' : 'metric';
				saveUnitModeToStorage();
				updateUnitToggleLabel();
				renderDistanceValue();
				renderVelocityValue(Number(velocityEstRef) || 0, 'velocity', '', '');
			});
		}

		var lookAheadAlertCooldownMs = 10000;

		function maybeAlertLookAhead() {
			var now = Date.now();
			if (now - lookAheadLastAlertAt < lookAheadAlertCooldownMs) {
				return;
			}

			if (stepsCountInterval.length < 4) {
				return;
			}

			var recentSteps = stepsCountInterval.slice(-4);
			var spanMs = recentSteps[recentSteps.length - 1] - recentSteps[0];
			if (spanMs <= 0) {
				return;
			}

			var cadenceSpm = ((recentSteps.length - 1) / (spanMs / 1000)) * 60;
			var holdingViewingPosture = !rotation && Math.abs(betaAngle) >= 20 && Math.abs(betaAngle) <= 85;

			if (holdingViewingPosture && cadenceSpm >= 70) {
				lookAheadLastAlertAt = now;
				flashLookAheadStars();
			}
		}

		function initializeDailyReset() {
			loadUnitModeFromStorage();
			updateUnitToggleLabel();
			if (isNewDay()) {
				resetMetricsStorage();
				if (steps) steps.innerHTML = 0;
				if (distance) renderDistanceValue();
				updateStarValueDisplay();
			} else {
				loadMetricsFromStorage();
				if (steps) steps.innerHTML = stepsCount;
				if (distance) renderDistanceValue();
				updateStarValueDisplay();
			}
		}

		function renderDistanceValue() {
			if (!distance) {
				return;
			}
			if (unitMode === 'metric') {
				if (distanceMeters >= 1000) {
					distance.innerHTML = "<div class='distanceMagnitude'>" + (distanceMeters / 1000).toFixed(2) + " km</div>distance";
				} else {
					distance.innerHTML = "<div class='distanceMagnitude'>" + distanceMeters.toFixed(1) + " m</div>distance";
				}
			} else {
				var distanceFeet = distanceMeters * 3.2808;
				var distanceMiles = distanceMeters / 1609.344;
				if (distanceFeet >= 5280) {
					distance.innerHTML = "<div class='distanceMagnitude'>" + distanceMiles.toFixed(2) + " mi</div>distance";
				} else {
					distance.innerHTML = "<div class='distanceMagnitude'>" + distanceFeet.toFixed(1) + " ft</div>distance";
				}
			}
		}

		function vibrateDevice(pattern) {
			if (navigator.vibrate) {
				navigator.vibrate(pattern || [60, 40, 60]);
			}
		}

		function resetDistanceTracking() {
			distanceTrackingStartedAt = 0;
			distanceLastSampleAt = 0;
			distanceMeters = 0;
			distanceStartSteps = stepsCount;
			distanceFromVelocityMeters = 0;
			renderDistanceValue();
		}

		function updateDistanceTracking(velocityMetersPerSec) {
			var now = Date.now();
			if (!distanceTrackingStartedAt) {
				distanceTrackingStartedAt = now;
				distanceLastSampleAt = now;
				distanceStartSteps = stepsCount;
				return;
			}

			var deltaSec = (now - distanceLastSampleAt) / 1000;
			distanceLastSampleAt = now;
			if (deltaSec < 0 || deltaSec > 3) {
				return;
			}

			var v = Math.max(0, Number(velocityMetersPerSec) || 0);
			distanceFromVelocityMeters += v * deltaSec;

			var stepsDelta = Math.max(0, stepsCount - distanceStartSteps);
			var stepDistanceMeters = stepsDelta * (avgMotionStride > 0 ? avgMotionStride : 0.72);

			// Keep distance primarily step-based, with a small velocity correction.
			distanceMeters = stepDistanceMeters + ((distanceFromVelocityMeters - stepDistanceMeters) * 0.1);
			if (distanceMeters < 0) {
				distanceMeters = 0;
			}
			renderDistanceValue();
			saveMetricsToStorage();
		}

		function startMetricsRecording() {
			metricsRecording = true;
			metricsRecords = [];
			metricsRecordingStartedAt = Date.now();
			stepsDefaultColor = steps.style.color || '';
			steps.style.color = '#007000';
			if (profilePanel) {
				profilePanel.classList.remove('d_n');
			}
			vibrateDevice([60, 40, 60]);
		}

		function stopMetricsRecording() {
			metricsRecording = false;
			steps.style.color = stepsDefaultColor;
			if (profilePanel) {
				profilePanel.classList.add('d_n');
			}
			vibrateDevice([60, 40, 60]);

			if (!metricsRecords.length) {
				// alert('Recording stopped.\nNo samples captured.');
				return;
			}

			var first = metricsRecords[0],
				last = metricsRecords[metricsRecords.length - 1],
				durationSec = Math.max(0.1, (last.ts - first.ts) / 1000),
				stepsDelta = Math.max(0, last.steps - first.steps),
				velocitySum = 0,
				velocityMax = 0,
				linearSum = 0,
				i = 0;

			for (i = 0; i < metricsRecords.length; i++) {
				velocitySum += metricsRecords[i].velocity;
				linearSum += metricsRecords[i].linearMag;
				if (metricsRecords[i].velocity > velocityMax) {
					velocityMax = metricsRecords[i].velocity;
				}
			}

			var velocityAvg = velocitySum / metricsRecords.length,
				linearAvg = linearSum / metricsRecords.length,
				cadenceSpm = (stepsDelta / durationSec) * 60;
            /*
			alert(
				'Metrics Summary\n' +
				'Duration: ' + durationSec.toFixed(1) + ' s\n' +
				'Samples: ' + metricsRecords.length + '\n' +
				'Steps Recorded: ' + stepsDelta + '\n' +
				'Avg Velocity: ' + velocityAvg.toFixed(2) + ' m/s\n' +
				'Peak Velocity: ' + velocityMax.toFixed(2) + ' m/s\n' +
				'Cadence: ' + cadenceSpm.toFixed(0) + ' spm\n' +
				'Avg Linear Mag: ' + linearAvg.toFixed(3) + '\n' +
				'Last Cadence Velocity: ' + latestCadenceVelocity.toFixed(2) + ' m/s'
			);*/
		}

		function toggleMetricsRecording() {
			if (metricsRecording) {
				stopMetricsRecording();
			} else {
				startMetricsRecording();
			}
		}

		function registerOutsideTripleTap(clientX, clientY) {
			var tappedElement = document.elementFromPoint(clientX, clientY);
			if (tappedElement && tappedElement.closest('.pwa')) {
				return;
			}

			var now = Date.now();
			metricsTapTimes[metricsTapTimes.length] = now;
			metricsTapTimes = metricsTapTimes.filter(function(t) {
				return now - t <= 900;
			});

			if (metricsTapTimes.length >= 3) {
				metricsTapTimes = [];
				toggleMetricsRecording();
			}
		}

		function setRecalibrateVisible(show) {
			if (!recalibrateToggle) {
				return;
			}
			if (show) {
				recalibrateToggle.classList.remove('d_n');
			} else {
				recalibrateToggle.classList.add('d_n');
			}
		}

		setRecalibrateVisible(false);
		resetDistanceTracking();

		screen.orientation.addEventListener("change", function() {
			// resetMotionParams();
		});

		function resetMotionParams() {
			clearInterval(timerCountStepInterval);
			clearTimeout(motionEndInterval);
			clearInterval(accelerationInterval);
			clearTimeout(motionEndCountInterval);

			clearTimeout(nDeviceTimeout);

			motionType = "";
			commuteMode = false;
			motionTypeCommute = null,
			motionTypeStep = null;

			nDeviceTimeout = null;

			normalAcc = 0;
			timerCountStepCheck = 0;
			timerCountStepInterval = null;
			timerCountStep = [];
			timerCounting = false;
			timerCount = 0;
			stepsCount = 0;
			stepsCountInterval = [];
			stepsCountTimes = [];
			betaAngle = 0;
			rotation = false;
			noStep = false;
			motion = false;
			oneStopMotion = false;
			motionInterval = null;
			motionVelocity = false;
			motionStride = 0;
			avgMotionStride = 0;
			refVelocity = false;
			motionEnd = false;
			motionEndInterval = null;
			motionStart = false;
			motionStartRef = 0;
			motionStartInterval = null;
			motionRef = false;
			velocityConstantRef = 0;
			velocityPoints = [];
			velocityError = false;
			velocityCycle = 0;

					if ((gpsPos === null || (gpsPos && gpsPos.coords.speed === null))) {
						// velocity.innerHTML = "velocity: " + velocityEst.toFixed(1) + velLimiter + " " + velocityUnit;
						renderVelocityValue(velocityEst, 'velocity', '', velLimiter);
						setRecalibrateVisible(velocityOutlier);
					} else {
						// velocity.innerHTML = "velocity: " + gpsVelocity.toFixed(1) + velLimiter + " " + velocityUnit;
						renderVelocityValue(gpsVelocity, 'velocity', '', velLimiter);
						setRecalibrateVisible(false);
					}

				} else if (motionVelocity) {
					if (accelerationPoints.length === 1) {
						var accelerationDelta = accelerationPoints[accelerationPoints.length - 1] + 0;
						velocityEst = (accelerationDelta / 2) * 1;
						velocitySign = (velocityEst > 0) ? "+" : (velocityEst === 0) ? "~" : "";
					} else if (accelerationPoints.length > 1) {
						var accelerationTango = accelerationPoints[accelerationPoints.length - 1] + accelerationPoints[accelerationPoints.length - 2];
						velocityEst = (accelerationTango / 2) * 1;
						velocitySign = (velocityEst > 0) ? "+" : (velocityEst === 0) ? "~" : "";
					}

					velocityEst = (velocityEst >= 0) ? (velocityEst < 10) ? velocityEst : 10 : (velocityEst > -10) ? velocityEst : -10;
					velocityEstRef = velocityEst;
					if ((gpsPos === null || (gpsPos && gpsPos.coords.speed === null))) {
						// velocity.innerHTML = "Δ velocity: " + velocitySign + velocityEst.toFixed(1) + " " + velocityUnit;
						renderVelocityValue(velocityEst, 'Δ velocity', velocitySign, '');
						setRecalibrateVisible(true);
					} else {
						// velocity.innerHTML = "velocity: " + gpsVelocity.toFixed(1) + " " + velocityUnit;
						renderVelocityValue(gpsVelocity, 'velocity', '', '');
						setRecalibrateVisible(false);
					}
				}

				if (metricsRecording) {
					metricsRecords[metricsRecords.length] = {
						ts: Date.now(),
						elapsedMs: Date.now() - metricsRecordingStartedAt,
						steps: stepsCount,
						velocity: Number(velocityEstRef) || 0,
						velocityLive: Number(velocityLive) || 0,
						linearMag: latestLinearMag,
						cadenceVelocity: latestCadenceVelocity,
						deviceAcc: nDeviceAcc,
						gravityMagnitude: latestGravityMagnitude,
						gravityNormalized: latestGravityNormalized
					};
				}

				if (!meaningfulMotion && Math.abs(Number(velocityEstRef) || 0) >= 0.35) {
					meaningfulMotion = true;
				}
				updateDistanceTracking(Number(velocityEstRef) || 0);
				if (meaningfulMotion) {
					trackWakeLockActivity();
				}

			} else {
				setRecalibrateVisible(false);
				velocityEst = 0;
				velocityEstRef = 0;
				if ((gpsPos === null || (gpsPos && gpsPos.coords.speed === null))) {
					// velocity.innerHTML = "velocity: " + velocityEst.toFixed(1) + " " + velocityUnit;
                    velocity.innerHTML = "<div class='velocityMagnitude'>" + velocityEst.toFixed(1) + ' ' + velocityUnit + "</div> velocity";
				} else {
					// velocity.innerHTML = "velocity: " + gpsVelocity.toFixed(1) + " " + velocityUnit;
                    velocity.innerHTML = "<div class='velocityMagnitude'>" + gpsVelocity.toFixed(1) + ' ' + velocityUnit + "</div> velocity";
				}
				if (typeof velocityUnit === 'undefined') {
					velocity.innerHTML = "";
				}
			}

			if (motion) {
				if (motionEndCountInterval === null) {
					motionEndCountInterval = setTimeout(function() {
						var stepsArray = [timerCountStep[timerCountStep.length - 3],
									timerCountStep[timerCountStep.length - 2],
									timerCountStep[timerCountStep.length - 1]
								],
							walking = true,
							walkingChange = false,
							walkingCount = 0;

						for (var i = 0; i < stepsArray.length; i++) {
							if (stepsArray[i] < 2) {
								walking = false;
								break;
							}
						}
						for (var i = 0; i < stepsArray.length; i++) {
							if (stepsArray[i] < 2) {
								walkingCount++;
							}
						}
						if (walkingCount > 0 && walkingCount < 3) {
							walkingChange = true;
						}

						motionEndCountArray[motionEndCountArray.length] = motionEndCount;
						motionEndCount = 0;
						clearTimeout(motionEndCountInterval);
						motionEndCountInterval = null;

						if (walking) {
							motionEndCount = 0;
							clearTimeout(motionEndCountInterval);
							motionEndCountInterval = null;
							motionEndCountArray = [];
							commuteMode = false;
						} else {
							let b = 0;
							while (b < motionEndCountArray.length) {
								if (motionEndCountArray[b] > 2 && nDeviceAcc > 1 && !walkingChange) {
									commuteMode = true;

									velocityConstantRef = 0;
									velocityEst = 0;
									velocityEstRef = 0;
									timerCountStep = [];

									if ((gpsPos === null || (gpsPos && gpsPos.coords.speed === null))) {
										// velocity.innerHTML = "velocity: " + velocityEst.toFixed(1) + " " + velocityUnit;
                                        velocity.innerHTML = "<div class='velocityMagnitude'>" + velocityEst.toFixed(1) + ' ' + velocityUnit + "</div> velocity";
									} else {
										// velocity.innerHTML = "velocity: " + gpsVelocity.toFixed(1) + " " + velocityUnit;
                                        velocity.innerHTML = "<div class='velocityMagnitude'>" + gpsVelocity.toFixed(1) + ' ' + velocityUnit + "</div> velocity";
									}

									break;
								}
								b++;
							}
						}
					}, 3000);
				}
			}

		}, false);

		window.addEventListener('deviceorientation', function(event) {
			if (event.alpha || event.beta || event.gamma) {
				deviceOrientation = true;
			}

			const mStoggle = document.querySelector('.pwa .motionSenseToggle');
			if (mStoggle.classList.contains("hide") && deviceMotion) {
				mStoggle.classList.remove("hide");
                mStoggle.innerHTML = "reading";
				setStartStopReadingState(true);
			}

			// if (!docHide) {
				betaAngle = event.beta;

				var bVal = Math.abs(Math.round(event.beta)),
					gVal = Math.abs(Math.round(event.gamma));

				if (bVal > 90 || gVal > 45) {
					// rotation = true;
				} else {
					rotation = false;
				}
			// }

		}, false);

		document.addEventListener('gesturestart', function(e) {
			e.preventDefault();
		});

		document.addEventListener('touchstart', function(e) {
			if (e.touches.length > 1) {
				e.preventDefault();
			}
		}, { passive: false });

		var lastTouchEnd = 0;
		document.addEventListener('touchend', function(e) {
			if (e.changedTouches && e.changedTouches.length === 1) {
				var touchPoint = e.changedTouches[0];
				registerOutsideTripleTap(touchPoint.clientX, touchPoint.clientY);
			}

			var now = Date.now();
			if (now - lastTouchEnd <= 300) {
				e.preventDefault();
			}
			lastTouchEnd = now;
		}, { passive: false });

	</script>

    <script>
        var myShakeEvent = new Shake({
                threshold: 15, // optional shake strength threshold
                timeout: 10 // optional, determines the frequency of event generation
            }),
            shaked = false;

        myShakeEvent.start();
        window.addEventListener('shake', shakeEventDidOccur, false);

        //function to call when shake occurs
        function shakeEventDidOccur () {
            shaked = true; 
            setTimeout(function() {
                shaked = false;
            }, 10);

            //put your own code here etc.
            // alert('shake!');
        }

        initializeDailyReset();
    </script>
